<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Live Stream Player</title>
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <style>
        body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .video-container { width: 90%; max-width: 800px; }
        .video-js { width: 100%; height: 450px; border-radius: 8px; }
    </style>
</head>
<body>

<div class="video-container">
    <video id="my-player" class="video-js vjs-big-play-centered" controls preload="auto" playsinline>
        <source src="https://muc002.myturn1.top:8088/live/webcricfifa1/playlist.m3u8?id=124249&pk=bb4c8519929a80b4bd3b7b0616dc26a35a810c4a4d5854f3a5299db9257c58176fa4886bd5d1fa6353462787010625fb276008b2d2129ac970c95f33c1f9a583" type="application/x-mpegURL">
    </video>
</div>

<script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
<script>
    var player = videojs('my-player', {
        autoplay: 'muted', // Must be muted to autoplay
        muted: true,       // Force mute for browser compliance
        playsinline: true  // Essential for mobile
    });

    // Attempt to play on load
    player.ready(function() {
        player.play().catch(function(error) {
            console.log("Autoplay blocked, waiting for user interaction.");
        });
    });

    // Auto-reload on error
    player.on('error', function() {
        console.warn("Stream error. Reconnecting...");
        setTimeout(() => {
            player.src({
                src: 'https://muc002.myturn1.top:8088/live/webcricfifa1/playlist.m3u8?id=124249&pk=bb4c8519929a80b4bd3b7b0616dc26a35a810c4a4d5854f3a5299db9257c58176fa4886bd5d1fa6353462787010625fb276008b2d2129ac970c95f33c1f9a583',
                type: 'application/x-mpegURL'
            });
            player.play();
        }, 2000);
    });
</script>

</body>
</html>
