<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>LK HLS PLAYER</title>
<meta http-equiv="Content-Security-Policy" content="default-src * 'unsafe-inline' 'unsafe-eval'; img-src * data: blob: 'unsafe-inline'; frame-src *; media-src * blob:;">
<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap');

:root {
--primary-color: #4f46e5;
--background-color: #1e1e2f;
--surface-color: #2a2a3d;
--text-color: #e0e0ff;
}

body {
margin: 0;
background: var(--background-color);
font-family: 'Poppins', sans-serif;
display: flex;
flex-direction: column;
min-height: 100vh;
align-items: center;
justify-content: center; /* प्लेयरलाई बिचमा राख्न */
padding: 1rem;
}

.player-container {
background: var(--surface-color);
padding: 10px;
border-radius: 10px;
width: 100%;
max-width: 800px;
}

video {
width: 100%;
border-radius: 10px;
background: black;
outline: none;
display: block;
}

/* तलको सम्पूर्ण भाग लुकाइएको */
.url-container {
    display: none !important;
}

h1 {
    color: #ffffff;
    font-size: 1.2rem;
    margin-bottom: 10px;
}
</style>
</head>
<body>

<h1>LK HLS PLAYER</h1>
<section class="player-container">
    <div class="video-section">
        <video id="video" controls playsinline webkit-playsinline autoplay muted></video>
    </div>
</section>

<!-- यो भाग देखिने छैन -->
<section class="url-container">
    <div class="url-section">
        <input id="url-input" type="text" />
        <button id="load-button">Load</button>
    </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script>
const video = document.getElementById('video');
const urlInput = document.getElementById('url-input');

// डिफल्ट URL
const defaultUrl = 'https://live.inplyr.com/room/360663.m3u8';

function setupPlayer(url) {
    if (Hls.isSupported()) {
        const hls = new Hls();
        hls.loadSource(url);
        hls.attachMedia(video);
        hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
    } else {
        video.src = url;
    }
}

// पेज लोड हुँदा अटोमेटिक चल्ने
window.addEventListener('load', () => {
    urlInput.value = defaultUrl;
    setupPlayer(defaultUrl);
});
</script>
</body>
</html>
