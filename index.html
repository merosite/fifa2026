<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Auto-Start HLS Player</title>
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <style>
        body { margin: 0; background: #000; height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .video-container { width: 100%; max-width: 960px; }
        .video-js { width: 100%; height: 50vh; }
    </style>
</head>
<body>

<div class="video-container">
    <video id="my-player" class="video-js vjs-big-play-centered" controls preload="auto" playsinline>
        <source src="https://muc002.myturn1.top:8088/live/webcricfifa1/playlist.m3u8?id=124249&pk=bb4c8519929a80b4bd3b7b0616dc26a35a810c4a4d5854f3a5299db9257c58176fa4886bd5d1fa6353462787010625fb276008b2d2129ac970c95f33c1f9a583" type="application/x-mpegURL">
    </video>
</div>

<script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
<script>
    var player = videojs('my-player', {
        autoplay: 'muted', // Attempt silent autoplay first
        muted: true,
        playsinline: true
    });

    // Handle "Autoplay Blocked" scenarios
    const startPlayback = () => {
        player.muted(false); // Unmute once user interacts
        player.play();
        document.removeEventListener('click', startPlayback);
    };

    player.ready(function() {
        // Attempt to play immediately
        player.play().catch(() => {
            console.log("Browser blocked autoplay. Waiting for user interaction.");
            // If blocked, wait for the first click anywhere on the page
            document.addEventListener('click', startPlayback, { once: true });
        });
    });

    // Auto-reload on error (e.g., if the stream drops)
    player.on('error', function() {
        console.warn("Stream failed. Attempting reload...");
        setTimeout(() => {
            player.load();
            player.play();
        }, 3000);
    });
</script>

</body>
</html>
