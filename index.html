<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>LK HLS PLAYER</title>
<meta http-equiv="Content-Security-Policy" content="default-src * 'unsafe-inline' 'unsafe-eval'; img-src * data: blob: 'unsafe-inline'; frame-src *; media-src * blob:;">
<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap');

:root {
--primary-color: #4f46e5;
--background-color: #1e1e2f;
--surface-color: #2a2a3d;
--text-color: #e0e0ff;
--accent-color: #818cf8;
--input-bg: #3b3b58;
--input-border: #55557a;
--input-focus-border: #4f46e5;
--error-color: #ef4444;
--title-color: #ffffff;
}

* {
box-sizing: border-box;
-webkit-user-select: none;
-moz-user-select: none;
-ms-user-select: none;
user-select: none;
}

body {
margin: 0;
background: var(--background-color);
font-family: 'Poppins', sans-serif;
color: var(--text-color);
display: flex;
flex-direction: column;
min-height: 100vh;
align-items: center;
justify-content: flex-start;
padding-top: 1rem;
padding-bottom: 10px;
}

h1 {
font-weight: 600;
margin-bottom: 0.5rem;
margin-top: 0.5rem;
color: var(--title-color);
text-align: center;
text-shadow: 2px 2px 4px rgba(0, 255, 127, 0.3);
}

.player-container {
background: var(--surface-color);
padding: 1.5rem;
border-radius: 10px;
width: 100%;
max-width: 800px;
margin-top: 0.5rem;
}

.video-section {
margin-bottom: 0;
position: relative;
}

video {
width: 100%;
border-radius: 10px;
background: black;
outline: none;
}

/* Hide video controls */
video::-webkit-media-controls-timeline,
video::-webkit-media-controls-current-time-display,
video::-webkit-media-controls-time-remaining-display {
display: none !important;
}

video::-webkit-media-controls-panel {
display: flex !important;
}

video::-webkit-media-controls-play-button,
video::-webkit-media-controls-mute-button,
video::-webkit-media-controls-volume-slider {
display: flex !important;
}

/* For Firefox */
video::-moz-range-track {
display: none !important;
}

/* For IE/Edge */
video::-ms-track {
display: none !important;
}

.error-message {
color: var(--error-color);
font-weight: 600;
margin-top: 0.25rem;
font-size: 0.9rem;
text-align: center;
}

@keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}

@media (max-width: 480px) {
body {
padding: 1rem;
}

.player-container {
max-width: 100%;
padding: 0.75rem;
}
}

/* Live Indicator */
.live-indicator {
position: absolute;
bottom: 11px;
left: 50px;
display: flex;
align-items: center;
background: transparent;
padding: 5px 10px;
border-radius: 4px;
z-index: 1000;
height: 40px;
}

.live-dot {
width: 8px;
height: 8px;
background-color: #ff0000;
border-radius: 50%;
margin-right: 6px;
animation: pulse 1.5s ease-in-out infinite;
}

.live-dot.inactive {
    background-color: #ffffff;
    animation: none;
    opacity: 0.7;
}

.live-text {
color: white;
font-size: 12px;
font-weight: 600;
text-transform: uppercase;
text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.5);
}

/* Ensure controls are always visible */
video::-webkit-media-controls-panel {
display: flex !important;
opacity: 1 !important;
}

/* Position live indicator relative to controls */
video:hover + .live-indicator,
.live-indicator:hover {
opacity: 1;
}

@keyframes pulse {
0% {
    transform: scale(1);
    opacity: 1;
}
50% {
    transform: scale(1.2);
    opacity: 0.7;
}
100% {
    transform: scale(1);
    opacity: 1;
}
}

@media (max-width: 480px) {
.live-indicator {
    left: 40px;
    height: 35px;
}

.live-dot {
    width: 6px;
    height: 6px;
}

.live-text {
    font-size: 10px;
}
}
</style>
</head>
<body>
<h1>LK HLS PLAYER</h1>
<section class="player-container" role="region" aria-label="HLS Video Player">
    <div class="video-section">
        <video id="video" controls playsinline webkit-playsinline autoplay muted></video>
        <div class="live-indicator">
            <div class="live-dot"></div>
            <span class="live-text">LIVE</span>
        </div>
    </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script>
const video = document.getElementById('video');
const liveDot = document.querySelector('.live-dot');

let hls;

// Add service worker registration at the start
if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').then(registration => {
            console.log('ServiceWorker registration successful');
        }).catch(err => {
            console.log('ServiceWorker registration failed: ', err);
        });
    });
}

// Cache video segments
const videoCache = new Map();

function setLiveDotInactive() {
    liveDot.classList.add('inactive');
}

function setLiveDotActive() {
    liveDot.classList.remove('inactive');
}

function showError(message) {
    console.error(message);
    setLiveDotInactive();
}

// Checks if the user is on Safari or an HLS native capable browser
function canPlayHlsNatively() {
const v = document.createElement('video');
return v.canPlayType('application/vnd.apple.mpegurl') !== '';
}

function tryAutoplay() {
    const playPromise = video.play();
    if (playPromise !== undefined) {
        playPromise
            .then(() => {
                console.log('Autoplay started successfully');
            })
            .catch(error => {
                console.log('Autoplay failed:', error);
                // Retry with muted audio if autoplay fails
                if (!video.muted) {
                    video.muted = true;
                    tryAutoplay();
                }
            });
    }
}

// Add continuous play monitoring
function setupContinuousPlay() {
    // Check every 500ms if video is paused
    setInterval(() => {
        if (video.paused && !video.ended) {
            console.log('Video paused, attempting to resume...');
            tryAutoplay();
        }
    }, 500);

    // Handle pause event
    video.addEventListener('pause', () => {
        console.log('Pause detected, attempting to resume...');
        setTimeout(tryAutoplay, 100);
    });

    // Handle seeking
    video.addEventListener('seeking', () => {
        console.log('Seeking detected, ensuring playback...');
        if (video.paused) {
            tryAutoplay();
        }
    });

    // Handle network issues
    video.addEventListener('waiting', () => {
        console.log('Network buffering, attempting to resume...');
        setTimeout(tryAutoplay, 1000);
    });
}

function reloadCurrentStream() {
    const currentUrl = video.currentSrc;
    if (currentUrl) {
        console.log('Reloading stream...');
        
        // Stop current playback
        video.pause();
        video.currentTime = 0;
        video.src = '';
        video.load();
        
        // Destroy existing HLS instance
        if (hls) {
            hls.destroy();
            hls = null;
        }
        
        // Wait a moment before restarting
        setTimeout(() => {
            // Force CORS headers
            const finalUrl = currentUrl.includes('?') ? 
                currentUrl + '&_=' + Date.now() : 
                currentUrl + '?_=' + Date.now();
            
            // Setup player with fresh HLS instance
            setupPlayer(finalUrl);
        }, 1000);
    } else {
        showError('No stream to reload');
    }
}

function setupPlayer(url) {
    setLiveDotInactive();

    if (hls) {
        hls.destroy();
        hls = null;
    }

    // Clean and validate URL
    url = url.trim();
    if (!url) {
        showError('Please enter a valid HLS .m3u8 URL');
        return;
    }

    // Force muted state and autoplay for initial load
    video.muted = true;
    video.autoplay = true;

    if (canPlayHlsNatively()) {
        video.src = url;
        video.load();
        video.play().catch(function(error) {
            console.log('Native playback failed:', error);
            tryAutoplay();
        });
        setupContinuousPlay();
    } else if (Hls.isSupported()) {
        try {
            hls = new Hls({
                debug: false,
                enableWorker: true,
                lowLatencyMode: true,
                autoStartLoad: true,
                startLevel: -1,
                abrEwmaFastLive: 3,
                abrEwmaSlowLive: 9,
                abrEwmaFastVoD: 3,
                abrEwmaSlowVoD: 9,
                maxBufferSize: 30 * 1000 * 1000,
                maxBufferLength: 40,
                maxMaxBufferLength: 600,
                manifestLoadingTimeOut: 15000,
                manifestLoadingMaxRetry: 6,
                manifestLoadingRetryDelay: 1000,
                levelLoadingTimeOut: 15000,
                levelLoadingMaxRetry: 6,
                levelLoadingRetryDelay: 1000,
                fragLoadingTimeOut: 20000,
                fragLoadingMaxRetry: 6,
                fragLoadingRetryDelay: 1000,
                backBufferLength: 30,
                startFragPrefetch: true,
                testBandwidth: true,
                progressive: true,
                lowLatencyMode: false
            });

            hls.loadSource(url);
            hls.attachMedia(video);
            
            hls.on(Hls.Events.MANIFEST_PARSED, function() {
                console.log('Manifest parsed, qualities available:', hls.levels.length);
                tryAutoplay();
                setupContinuousPlay();
            });

            let retryCount = 0;
            const MAX_RETRIES = 5;

            hls.on(Hls.Events.ERROR, function(event, data) {
                console.log('HLS Error:', data.type, data.details);
                if (data.fatal) {
                    switch(data.type) {
                        case Hls.ErrorTypes.NETWORK_ERROR:
                            if (retryCount < MAX_RETRIES) {
                                retryCount++;
                                showError(`Network error, attempting recovery (${retryCount}/${MAX_RETRIES})...`);
                                setTimeout(() => {
                                    hls.startLoad();
                                }, 1000 * retryCount);
                            } else {
                                showError('Maximum retry attempts reached. Please check your connection.');
                            }
                            break;
                        case Hls.ErrorTypes.MEDIA_ERROR:
                            console.log('Media error, attempting recovery...');
                            showError("Media error. Recovering...");
                            hls.recoverMediaError();
              0             break;
                        default:
                            showError("An error occurred while loading the video.");
                            console.error('Fatal error:', data);
                            hls.destroy();
                            break;
                    }
                }
            });

            // Add quality level monitoring
            hls.on(Hls.Events.LEVEL_SWITCHED, function(event, data) {
                console.log('Quality level switched to:', data.level);
            });

            // Add buffer monitoring
            hls.on(Hls.Events.BUFFER_APPENDED, function(event, data) {
                console.log('Buffer appended:', data);
            });

        } catch (error) {
            console.error('Error setting up HLS:', error);
            showError("Failed to initialize player: " + error.message);
        }
    } else {
        showError('Your browser does not support HLS playback.');
    }
}

// Automatically reload video after it ends (non live)
video.addEventListener('ended', () => {
// Reload automatically
const currentSrc = video.currentSrc || video.src;
if(currentSrc){
setTimeout(() => {
setupPlayer(currentSrc);
}, 2000);
}
});

// On page load, set default URL and setup player
window.addEventListener('load', () => {
    const streamUrl = 'https://muc001.myturn1.top:8088/live/webcricfifa2/playlist.m3u8?vidictid=206393821343&id=117658&pk=bb4c8519929a80b4bd3b7b0616dc26a35a810c4a4d5854f3a5299db9257c58176fa4886bd5d1fa6353462787010625fb276008b2d2129ac970c95f33c1f9a583';
    video.muted = true;
    video.autoplay = true;
    setupPlayer(streamUrl);
});

// Add keyboard shortcut (R key) for reload
document.addEventListener('keydown', event => {
    if (event.key.toLowerCase() === 'r' && !event.ctrlKey && !event.metaKey) {
        reloadCurrentStream();
    }
});

// Add double click handler for fullscreen
video.addEventListener('dblclick', (event) => {
    event.preventDefault();
    event.stopPropagation();
    
    if (document.fullscreenElement) {
        document.exitFullscreen();
    } else {
        video.requestFullscreen();
    }
});

// Add event listeners for video states
video.addEventListener('playing', () => {
    setLiveDotActive();
});

video.addEventListener('waiting', () => {
    setLiveDotInactive();
});

video.addEventListener('pause', () => {
    setLiveDotInactive();
});

video.addEventListener('error', () => {
    setLiveDotInactive();
});

video.addEventListener('click', (event) => {
    // Check if the click is on the controls
    const rect = video.getBoundingClientRect();
    const y = event.clientY - rect.top;
    
    // If click is not in the bottom control area (approximately last 40px)
    if (y < (rect.height - 40)) {
        event.preventDefault();
        event.stopPropagation();
        return false;
    }
});

// Prevent selection from being lost when clicking outside
document.addEventListener('mousedown', (event) => {
    if (window.getSelection().toString().length > 0) {
        const selection = window.getSelection();
        if (selection.rangeCount > 0) {
            const range = selection.getRangeAt(0);
        }
    }
});
</script>
</body>
</html>
